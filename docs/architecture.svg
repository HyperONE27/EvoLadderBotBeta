<svg width="100%" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg" role="img">
<title>EvoLadderBot architecture diagram</title>
<desc>Two-column architecture with double-headed arrows for bidirectional connections.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Discord Users -->
<rect x="80" y="30" width="200" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" x="180" y="52" text-anchor="middle" dominant-baseline="central">Discord users</text>

<!-- Users ↔ Discord auth (double-headed) -->
<line x1="282" y1="52" x2="398" y2="52" stroke="#888780" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#888780" x="340" y="44" text-anchor="middle">auth</text>

<!-- Users → Bot -->
<line x1="180" y1="76" x2="180" y2="148" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#888780" x="188" y="116" text-anchor="start">slash commands</text>
<text font-family="sans-serif" font-size="12" fill="#888780" x="188" y="130" text-anchor="start">buttons, replays</text>

<!-- Bot -->
<rect x="80" y="154" width="200" height="100" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489" x="180" y="182" text-anchor="middle" dominant-baseline="central">Bot</text>
<text font-family="sans-serif" font-size="12" fill="#534AB7" x="180" y="200" text-anchor="middle" dominant-baseline="central">discord.py</text>
<text font-family="sans-serif" font-size="12" fill="#534AB7" x="180" y="220" text-anchor="middle" dominant-baseline="central">slash commands · embeds</text>
<text font-family="sans-serif" font-size="12" fill="#534AB7" x="180" y="236" text-anchor="middle" dominant-baseline="central">replay upload · msg queue</text>

<!-- Bot ↔ Backend HTTP/WS -->
<line x1="168" y1="256" x2="168" y2="328" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#888780" x="160" y="296" text-anchor="end">HTTP</text>
<line x1="192" y1="328" x2="192" y2="256" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#888780" x="200" y="296" text-anchor="start">WS</text>

<!-- Backend -->
<rect x="80" y="334" width="370" height="100" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C" x="265" y="362" text-anchor="middle" dominant-baseline="central">Backend</text>
<text font-family="sans-serif" font-size="12" fill="#185FA5" x="265" y="380" text-anchor="middle" dominant-baseline="central">FastAPI + Polars</text>
<text font-family="sans-serif" font-size="12" fill="#185FA5" x="265" y="400" text-anchor="middle" dominant-baseline="central">matchmaker · ELO · replay parser · WS broadcast</text>

<!-- Backend → Supabase -->
<line x1="265" y1="436" x2="265" y2="556" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#888780" x="273" y="500" text-anchor="start">read / write</text>

<!-- Discord platform -->
<rect x="400" y="30" width="210" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" x="505" y="52" text-anchor="middle" dominant-baseline="central">Discord</text>

<!-- Discord ↔ Bot Gateway (diagonal, double-headed) -->
<line x1="402" y1="74" x2="278" y2="154" stroke="#888780" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<rect x="310" y="105" width="58" height="16" fill="white"/>
<text font-family="sans-serif" font-size="12" fill="#888780" x="339" y="117" text-anchor="middle">Gateway</text>

<!-- Discord ↔ Channel Manager Gateway (vertical, double-headed) -->
<line x1="505" y1="76" x2="505" y2="152" stroke="#888780" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<rect x="476" y="105" width="58" height="16" fill="white"/>
<text font-family="sans-serif" font-size="12" fill="#888780" x="505" y="117" text-anchor="middle">Gateway</text>

<!-- Channel Manager -->
<rect x="400" y="154" width="210" height="100" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="505" y="182" text-anchor="middle" dominant-baseline="central">Channel manager</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="505" y="200" text-anchor="middle" dominant-baseline="central">discord.py + FastAPI</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="505" y="220" text-anchor="middle" dominant-baseline="central">create / delete channels</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="505" y="236" text-anchor="middle" dominant-baseline="central">channel DB tracking</text>

<!-- Backend → Channel Manager HTTP (same color as all other arrows) -->
<path d="M452 384 L517 384 L517 258" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#888780" x="525" y="330" text-anchor="start">HTTP</text>

<!-- Channel Manager → Supabase -->
<line x1="493" y1="256" x2="493" y2="556" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#888780" x="501" y="430" text-anchor="start">write-heavy</text>

<!-- Supabase -->
<rect x="80" y="562" width="540" height="50" rx="8" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#27500A" x="350" y="580" text-anchor="middle" dominant-baseline="central">Supabase</text>
<text font-family="sans-serif" font-size="12" fill="#3B6D11" x="350" y="598" text-anchor="middle" dominant-baseline="central">PostgreSQL + File Storage</text>

</svg>
