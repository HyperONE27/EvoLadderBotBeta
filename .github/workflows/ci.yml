name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install tools
        run: pip install --upgrade pip ruff mypy

      - name: Ruff + mypy in one go
        run: ruff check --fix --diff . && ruff format --check . && mypy src