name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install developer dependencies
        run: pip install -r requirements-dev.txt

      - name: ruff check
        run: ruff check . && ruff format --check .

      - name: mypy
        run: mypy backend bot