[tool.mypy]
# Keep useful stuff, drop the most annoying strict parts
strict = false
warn_return_any = true
warn_unused_ignores = true
show_error_codes = true
pretty = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_untyped_calls = false

# Silence polars type issues in dataframe schemas
[[tool.mypy.overrides]]
module = "backend.domain_types.dataframes"
disable_error_code = "dict-item"

# Silence checks on miscellaneous modules
[[tool.mypy.overrides]]
module = "misc.*"
ignore_errors = true
